services:
  voices:
    container_name: voices
    image: usdotfhwastoldev/voices:P-9-15_0.0.1
    tty: true
    ipc: "host"
    network_mode: "host"
    environment:
      - DISPLAY=$DISPLAY
      - SDL_VIDEODRIVER=x11
      - XAUTHORITY=~/.Xauthority
      - VUG_CONTAINER_IMAGE=voices
      - VUG_SITE_CONFIG_FILE=${VUG_SITE_CONFIG_FILE}
      - VUG_SCENARIO_CONFIG_FILE=${VUG_SCENARIO_CONFIG_FILE}
      - VUG_VPN_LOCAL_ADDRESS=${VUG_VPN_LOCAL_ADDRESS}
      - VUG_VPN_EM_ADDRESS=${VUG_VPN_EM_ADDRESS}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${VUG_LOCAL_VOICES_POC_PATH}:/home/dt_user/voices-poc
      - ~/tenadev/INSTALL:/home/dt_user/VUG_Adapters
      - ~/voices-poc/docker/build/lib/COPY/start_scripts:/home/dt_user/start_scripts
